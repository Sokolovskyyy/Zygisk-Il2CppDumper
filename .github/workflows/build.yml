name: Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 11
        cache: gradle
    - name: Build module
      run: |
        chmod +x ./gradlew
        sed -i "s/^\(moduleDescription = \"\)/\1(${PACKAGE_NAME}) /" module.gradle
        sed -i "s/^#define GamePackageName.*/#define GamePackageName \"${PACKAGE_NAME}\"/" module/src/main/cpp/game.h
        ./gradlew :module:assembleRelease
      env:
        PACKAGE_NAME: ${{ github.event.inputs.package_name }}
    - uses: actions/upload-artifact@v4
      with:
        name: zygisk-il2cppdumper
        path: out/magisk_module_release/
